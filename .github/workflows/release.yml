name: Automatic Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    uses: saucebase-dev/saucebase/.github/workflows/semantic-release.yml@main
    with:
      version_file: "module.json"
      version_file_path: ".version"
      prerelease: false
    secrets: inherit
